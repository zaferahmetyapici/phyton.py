name: Build Android APK

on:
  workflow_dispatch:
  push:
    paths:
      - mobile_app/**
      - .github/workflows/android-apk.yml

jobs:
  build-apk:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build tools
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"
          sdkmanager_home="$(dirname "$(dirname "$(command -v sdkmanager)")")"
          sudo rm -rf "$ANDROID_SDK_ROOT/tools"
          sudo ln -s "$sdkmanager_home" "$ANDROID_SDK_ROOT/tools"
          "$ANDROID_SDK_ROOT/tools/bin/sdkmanager" --sdk_root="$ANDROID_SDK_ROOT" --list > /dev/null
          echo "$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_PATH
          echo "$ANDROID_SDK_ROOT/build-tools/34.0.0" >> $GITHUB_PATH
          echo "ANDROIDSDK=$ANDROID_SDK_ROOT" >> $GITHUB_ENV

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential ccache git zip unzip autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev

      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip
          python -m pip install Cython==0.29.36 buildozer
          python -c "import buildozer; print(buildozer.__file__)"

      - name: Build debug APK
        run: |
          python - <<'PY'
          import os
          import shutil
          import subprocess
          import sys

          os.chdir("mobile_app")
          if not os.path.exists("buildozer.spec"):
            raise FileNotFoundError("buildozer.spec not found in mobile_app")

          sdk_root = os.environ["ANDROID_SDK_ROOT"]
          os.environ.update(
              ANDROID_HOME=sdk_root,
              ANDROIDSDK=sdk_root,
              ANDROID_SDK=sdk_root,
          )
          build_tools_dir = os.path.join(sdk_root, "build-tools", "34.0.0")
          aidl_file = os.path.join(build_tools_dir, "aidl")
          if not os.path.isfile(aidl_file) or not os.access(aidl_file, os.X_OK):
            raise FileNotFoundError(f"AIDL was not installed at {aidl_file}")
          os.environ["PATH"] = f"{build_tools_dir}{os.pathsep}{os.environ['PATH']}"

          with open("buildozer.spec", encoding="utf-8") as spec_file:
            spec_text = spec_file.read()
          spec_text = spec_text.replace(
              "android.api = 34\n",
              f"android.api = 34\nandroid.sdk_path = {sdk_root}\n",
          )
          with open("buildozer.spec", "w", encoding="utf-8") as spec_file:
            spec_file.write(spec_text)

          buildozer_exe = shutil.which("buildozer")
          if not buildozer_exe:
            scripts_dir = subprocess.check_output(
              [sys.executable, "-c", "import sysconfig; print(sysconfig.get_path('scripts'))"],
              text=True,
            ).strip()
            buildozer_exe = os.path.join(scripts_dir, "buildozer")

          print(f"Using buildozer executable: {buildozer_exe}")
          print(f"ANDROID_SDK_ROOT: {os.environ.get('ANDROID_SDK_ROOT')}")
          print(f"ANDROID_HOME: {os.environ.get('ANDROID_HOME')}")
          print(f"Git path: {shutil.which('git')}")
          aidl_path = shutil.which("aidl")
          print(f"AIDL path: {aidl_path}")
          if not aidl_path:
            raise RuntimeError("aidl not found in PATH after Android SDK setup")
          aidl_result = subprocess.run([aidl_path], check=False)
          if aidl_result.returncode not in (0, 1):
            raise RuntimeError(f"AIDL could not execute (exit code {aidl_result.returncode})")
          subprocess.check_call([buildozer_exe, "android", "debug"])
          PY

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: pattern-picnic-android-apk
          path: mobile_app/bin/*.apk
          if-no-files-found: error
