name: Build Android APK

on:
  workflow_dispatch:
  push:
    paths:
      - mobile_app/**
      - .github/workflows/android-apk.yml

jobs:
  build-apk:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build tools
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-34" "platforms;android-33" "build-tools;34.0.0" "build-tools;33.0.2"
          echo "$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_PATH
          echo "$ANDROID_SDK_ROOT/build-tools/34.0.0" >> $GITHUB_PATH
          echo "$ANDROID_SDK_ROOT/build-tools/33.0.2" >> $GITHUB_PATH

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential ccache git zip unzip autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev

      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip
          python -m pip install Cython==0.29.36 buildozer
          python -c "import buildozer; print(buildozer.__file__)"

      - name: Build debug APK
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          ANDROIDSDK: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_SDK: ${{ env.ANDROID_SDK_ROOT }}
        run: |
          python - <<'PY'
          import os
          import shutil
          import subprocess
          import sys

          os.chdir("mobile_app")
          if not os.path.exists("buildozer.spec"):
            raise FileNotFoundError("buildozer.spec not found in mobile_app")

          buildozer_exe = shutil.which("buildozer")
          if not buildozer_exe:
            scripts_dir = subprocess.check_output(
              [sys.executable, "-c", "import sysconfig; print(sysconfig.get_path('scripts'))"],
              text=True,
            ).strip()
            buildozer_exe = os.path.join(scripts_dir, "buildozer")

          print(f"Using buildozer executable: {buildozer_exe}")
          print(f"ANDROID_SDK_ROOT: {os.environ.get('ANDROID_SDK_ROOT')}")
          print(f"ANDROID_HOME: {os.environ.get('ANDROID_HOME')}")
          print(f"Git path: {shutil.which('git')}")
          aidl_path = shutil.which("aidl")
          print(f"AIDL path: {aidl_path}")
          if not aidl_path:
            raise RuntimeError("aidl not found in PATH after Android SDK setup")
          subprocess.check_call([buildozer_exe, "android", "debug"])
          PY

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: pattern-picnic-android-apk
          path: mobile_app/bin/*.apk
          if-no-files-found: error
